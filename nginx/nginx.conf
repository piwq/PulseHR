# PulseHR gateway. Маршрутизация по префиксу URL — это и есть «микросервисы».
events {}

http {
    # Docker internal DNS. valid=10s — переспрашивать IP каждые 10 с
    # (нужно когда контейнер перезапускается и меняет IP).
    resolver 127.0.0.11 ipv6=off valid=10s;

    upstream core     { server core:8000; }
    upstream frontend { server frontend:80; }

    server {
        listen 80;

        # --- SSE: критично, иначе стрим не течёт ---
        # Используем переменную чтобы nginx резолвил insights динамически
        # (без этого 502 после перезапуска insights-контейнера).
        location /api/insights/alerts/stream/ {
            set $ins http://insights:8000;
            proxy_pass $ins;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
            proxy_read_timeout 3600s;
        }

        # --- insights API (динамический резолв) ---
        location /api/insights/ {
            set $ins http://insights:8000;
            proxy_pass $ins;
            proxy_set_header Host $host;
        }

        # --- core API ---
        location /api/ {
            proxy_pass http://core;
            proxy_set_header Host $host;
        }

        # --- Django admin + его статика ---
        location /admin/ {
            proxy_pass http://core;
            proxy_set_header Host $host;
        }
        location /static/ {
            proxy_pass http://core;
            proxy_set_header Host $host;
        }

        # --- фронт (собранная статика Vue) ---
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
